name: Barometr update

# Uruchamianie: ~raz na godzine (UTC, minuta 17 - celowo poza pelna godzina,
# bo o ":00" GitHub czesto opoznia/gubi zaplanowane runy przy duzym obciazeniu).
# Harmonogram jest best-effort i nie musi byc punktualny. Plus recznie ("Run workflow").
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

# Wymusza Node 24 dla akcji JS (checkout/setup-python) - usuwa warning o deprecacji Node20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Potrzebne, aby workflow mogl zapisac (commit) wynik z powrotem do repo.
permissions:
  contents: write

# Brak nakladania sie uruchomien.
concurrency:
  group: barometr
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom silnik
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          MODEL: anthropic/claude-haiku-4.5
          MAX_OUTPUT_TOKENS: "12000"
        run: python silnik.py

      - name: Publikacja wyniku
        run: |
          git config user.name "barometr-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f barometer.json barometer_*.json pamiec_*.json manifest.json lenses.json
          # Tylko gdy sa zmiany. Kolejnosc: commit -> rebase na najnowszy zdalny stan -> push.
          # (rebase MUSI byc po commicie - z zastage'owanymi, niezcommitowanymi plikami pull --rebase
          #  pada: "cannot pull with rebase: Your index contains uncommitted changes").
          if ! git diff --quiet --cached; then
            git commit -m "update barometer $(date -u +%FT%TZ)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      # WB-053E: alert operatora — brak swiezej publikacji >= 3h (cichy przestoj silnika).
      # Zawsze wykonuje sie (nawet gdy wczesniejszy krok padnie) i nigdy nie failuje workflow.
      - name: Alert operatora — publikacja starsza niz 3h
        if: always()
        env:
          NTFY_KANAL: ${{ secrets.NTFY_KANAL }}
        run: |
          python3 - <<'PY'
          import json, os, sys, datetime, urllib.request

          try:
              with open("barometer.json", "r", encoding="utf-8") as f:
                  dane = json.load(f)
              ts = datetime.datetime.fromisoformat(dane.get("updated_at", "").replace("Z", "+00:00"))
              wiek_h = (datetime.datetime.now(datetime.timezone.utc) - ts).total_seconds() / 3600
          except Exception as e:
              print(f"[uwaga] WB-053E: nie mozna odczytac updated_at z barometer.json: {e}")
              sys.exit(0)

          print(f"[info] WB-053E: barometer.json updated_at wiek = {wiek_h:.1f}h")
          if wiek_h < 3:
              sys.exit(0)

          kanal = os.getenv("NTFY_KANAL")
          if not kanal:
              print("[uwaga] WB-053E: brak NTFY_KANAL — alert pominiety (ustaw secret, aby wlaczyc)")
              sys.exit(0)

          try:
              req = urllib.request.Request(
                  f"https://ntfy.sh/{kanal}",
                  data=f"World Barometer: brak swiezej publikacji od {wiek_h:.1f}h.".encode("utf-8"),
                  headers={"Title": "Barometr: stara publikacja", "Priority": "high", "Tags": "warning"},
                  method="POST",
              )
              urllib.request.urlopen(req, timeout=10)
              print("[info] WB-053E: alert operatora wyslany (ntfy)")
          except Exception as e:
              print(f"[uwaga] WB-053E: alert nie wyslany: {e}")
          PY
